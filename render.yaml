services:
  # Backend Node Service
  - type: web
    name: eduworld-api
    env: node
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: PORT
        value: 5000

  # Frontend Vite Service
  - type: web
    name: eduworld-client
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: eduworld-api
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
